<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ігровий день | Лазертаг</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/tv.css">
  <script
    type="module"
    src="scripts/polyfills.js?v=2025-09-19-avatars-2"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js?v=2025-09-19-avatars-2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Press Start 2P', monospace;
      background: #111 url('assets/background_marathon.png') no-repeat center/cover;
      color: #fff;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(0,0,0,0.7);
      padding: 0.75rem;
      font-size: 1rem;
    }
    nav a {
      color: #f39c12;
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      transition: color 0.2s, background 0.2s;
      border-radius: 3px;
    }
    nav #fullscreen {
      color: #f39c12;
      background: none;
      border: none;
      font: inherit;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      transition: color 0.2s, background 0.2s;
      border-radius: 3px;
    }
    nav a.active, nav a:hover {
      color: #000;
      background: #ffd700;
    }
    nav #fullscreen:hover {
      color: #000;
      background: #ffd700;
    }
    .container {
      width: 100%;
      max-width: 1920px;
      margin: 1rem auto;
      padding: 0 1rem;
    }
    .dashboard-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
      margin-bottom: 1rem;
    }
    .section-wrap {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1.2fr 1fr;
      }
      .section-wrap {
        grid-template-columns: 1fr 1fr;
      }
    }
    .live-card {
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: linear-gradient(145deg, rgba(14,14,18,0.94), rgba(24,24,28,0.88));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 0 18px rgba(0,0,0,0.45);
      border-radius: 10px;
      padding: 1rem;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.7rem;
    }
    .live-title {
      color: #9ed4ff;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .live-value {
      font-size: 1.35rem;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
    }
    .live-date {
      font-size: 28px;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 18px rgba(255, 215, 0, 0.55);
    }
    .live-mvp-name {
      font-size: 1.7rem;
      color: #ffe082;
      text-shadow: 0 0 10px rgba(255, 187, 51, 0.9), 0 0 24px rgba(255, 130, 0, 0.55);
    }
    .live-mvp-meta {
      font-size: 0.72rem;
      color: #ffd79b;
    }
    .filters {
      display:flex;
      flex-wrap:wrap;
      gap:0.5rem;
      align-items:stretch;
      margin-bottom:1rem;
    }
    select, input[type=date], .filters button {
      padding:0.7rem;
      font-size:0.85rem;
      background:rgba(4,10,20,0.85);
      color:#fff;
      border-radius:8px;
      font-family: 'Press Start 2P', monospace;
      cursor:pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.35);
    }
    .filters select, .filters input[type=date] {
      flex: 1 1 220px;
    }
    .filters button {
      flex: 1 1 100%;
      background: linear-gradient(90deg, #ff6a00 0%, #ffd700 52%, #ffe66d 100%);
      color: #1a1200;
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
      box-shadow: 0 0 14px rgba(255, 166, 0, 0.65), inset 0 -2px 0 rgba(0,0,0,0.15);
    }
    .table-container { overflow-x:auto; margin-bottom:1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      table-layout: fixed;
    }
    .matches-table {
      table-layout: auto;
    }
    th, td {
      border: 1px solid #444;
      padding: 0.4rem;
      text-align: center;
      word-wrap: break-word;
    }
    thead th { background:#222; color:#f39c12; position:sticky; top:0; }
    tbody tr:nth-child(odd){ background:rgba(255,255,255,0.05); }
    .up   { color:lime; }
    .down { color:red; }
    .rank-header {
      white-space: nowrap;
    }
    .rank-change-placeholder {
      display: inline-flex;
      width: 1.5rem;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      margin-left: 0.3rem;
    }
    .rank-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .rank-cell .rank-change-icon {
      width: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .rank-change-icon.up   { color: lime; }
    .rank-change-icon.down { color: #ff4d4f; }
    .rank-change-icon.same { color: #ffd700; }
    .awards-cell {
      font-size: 0.8rem;
      color: #ffd700;
      letter-spacing: 0.02em;
    }
    .avatar-img { width:40px; height:40px; object-fit:cover; }
    .nick-S { color: magenta; }
    .nick-A { color: red; }
    .nick-B { color: yellow; }
    .nick-C { color: cyan; }
    .nick-D { color: lime; }
    .nick-E { color: green; }
    .nick-F { color: gray; }
    .team-label {
      position:relative;
    }
    .team-win {
      border:2px solid lime;
      box-shadow:0 0 6px lime;
    }
    .team-loss {
      border:2px solid red;
      box-shadow:0 0 6px red;
    }
    .vp {
      color:#ffd700;
    }
    .vs {
      color:#ffd700;
      font-size:1.1rem;
    }
    .matches-table tr.totals td {
      font-weight: 700;
      background: rgba(255, 215, 0, 0.1);
      color: #ffd700;
      text-align: left;
    }
    .hidden {
      display: none !important;
    }
    @media (max-width: 600px) {
      nav { font-size:0.75rem; }
      table { font-size:0.75rem; }
      select, input[type=date], .filters button { font-size:0.75rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Молодша Ліга</a>
    <a href="sunday.html">Старша Ліга</a>
    <a href="gameday.html" class="active">Ігровий день</a>
    <a href="rules.html">Правила</a>
    <a href="about.html">Про клуб</a>
    <button id="fullscreen">⛶</button>
  </nav>
  <div class="container">
    <div class="dashboard-grid">
      <section class="live-card">
        <div class="live-title">DATE</div>
        <div id="liveDate" class="live-date">--</div>
      </section>
      <section class="live-card">
        <div class="live-title">MATCHES</div>
        <div id="liveMatches" class="live-value">0</div>
      </section>
      <section class="live-card">
        <div class="live-title">BATTLES</div>
        <div id="liveBattles" class="live-value">0</div>
      </section>
      <section class="live-card">
        <div class="live-title">MVP</div>
        <div id="liveMvpName" class="live-mvp-name">—</div>
        <div id="liveMvpMeta" class="live-mvp-meta">Чекаємо на результати</div>
      </section>
    </div>
    <div class="filters">
        <select id="league">
          <option value="kids">Молодша ліга</option>
          <option value="sundaygames">Старша ліга</option>
        </select>
      <input type="date" id="date" />
      <button id="loadBtn">Завантажити</button>
    </div>
    <div class="section-wrap">
    <section>
      <h2>Поточні гравці</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="rank-header">Позиція (попередня)<span class="rank-change-placeholder" aria-hidden="true">⬍</span></th>
              <th>Аватар</th>
              <th>Нік</th>
              <th>Бали</th>
              <th>Ігор</th>
              <th>Перемоги</th>
              <th>Нагороди (MVP/🥈/🥉)</th>
              <th>Зміна</th>
            </tr>
          </thead>
          <tbody id="players"></tbody>
        </table>
      </div>
    </section>
    <section>
      <h2>Матчі сьогодні</h2>
      <div class="table-container">
        <table class="matches-table">
          <thead><tr><th>Команда 1</th><th>Рахунок</th><th>Команда 2</th><th>MVP</th></tr></thead>
          <tbody id="matches"></tbody>
        </table>
      </div>
    </section>
    </div>
  </div>
  <script src="scripts/toast.js?v=2025-09-19-avatars-2"></script>
  <script type="module" src="scripts/config.js"></script>
  <script type="module" src="scripts/logger.js"></script>
  <script type="module" src="scripts/api.js"></script>
  <script type="module" src="scripts/avatars.client.js"></script>
  <script type="module" src="scripts/gameday.js?v=2025-09-19-avatars-2"></script>
  </body>
</html>
