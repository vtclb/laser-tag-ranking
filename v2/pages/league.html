<section class="league-page" id="leaguePage">
  <section class="px-card league-hero" id="leagueHero"></section>

  <section class="px-card league-top10" id="leagueTop10Section">
    <h2 class="px-card__title league-section-title" id="leagueTableTitle">ТОП-10 гравців</h2>
    <div class="league-search-toolbar" aria-label="Пошук гравців">
      <label class="league-search-wrap" for="leagueSearchInput">
        <span>Пошук</span>
        <input class="search-input league-search-input" id="leagueSearchInput" type="search" placeholder="Нікнейм гравця" autocomplete="off">
      </label>
    </div>

    <div class="league-table-shell">
      <table class="league-ranking-table" aria-label="Рейтинг гравців ліги">
        <thead class="league-ranking-table__head">
          <tr>
            <th class="league-ranking-table__cell league-ranking-table__cell--place" scope="col"><button class="league-sort-header is-active" type="button" data-sort="default" aria-label="Сортувати за рейтингом" aria-sort="descending">#</button></th>
            <th class="league-ranking-table__cell league-ranking-table__cell--player" scope="col">Гравець</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--points" scope="col"><button class="league-sort-header" type="button" data-sort="points" aria-label="Сортувати за очками" aria-sort="none">Очки</button></th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col"><button class="league-sort-header" type="button" data-sort="matches" aria-label="Сортувати за кількістю ігор" aria-sort="none">Ігри</button></th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col"><button class="league-sort-header" type="button" data-sort="battles" aria-label="Сортувати за кількістю боїв" aria-sort="none">Бої</button></th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col"><button class="league-sort-header" type="button" data-sort="winRate" aria-label="Сортувати за відсотком перемог" aria-sort="none">WR %</button></th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP1</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP2</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP3</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col"><button class="league-sort-header" type="button" data-sort="delta" aria-label="Сортувати за зміною рейтингу" aria-sort="none">Δ рейтинг</button></th>
          </tr>
        </thead>
        <tbody class="league-ranking-table__body" id="leagueTableBody"></tbody>
      </table>
    </div>

    <div class="px-card__actions league-actions">
      <button class="button-primary" id="leagueExpandBtn" type="button">Показати всіх гравців</button>
    </div>
  </section>

  <section class="px-card league-infographic" id="leagueInfographic"></section>
</section>
