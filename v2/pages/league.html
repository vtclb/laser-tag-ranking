<section class="league-page" id="leaguePage">
  <section class="px-card league-hero" id="leagueHero"></section>

  <section class="px-card league-top10" id="leagueTop10Section">
    <h2 class="px-card__title league-section-title" id="leagueTableTitle">ТОП-10 поточного сезону</h2>
    <div class="league-table-toolbar" role="toolbar" aria-label="Керування таблицею рейтингу">
      <label class="league-search-wrap" for="leagueSearchInput">
        <span>Пошук</span>
        <input class="search-input league-search-input" id="leagueSearchInput" type="search" placeholder="Нікнейм гравця" autocomplete="off">
      </label>
      <div class="league-sort-controls" id="leagueSortControls" aria-label="Сортування">
        <span class="league-sort-controls__label">Сортування</span>
        <div class="league-sort-controls__buttons">
          <button class="league-sort-btn is-active" type="button" data-sort="default" title="Рейтинг">RTG</button>
          <button class="league-sort-btn" type="button" data-sort="points" title="Очки">PTS</button>
          <button class="league-sort-btn" type="button" data-sort="matches" title="Ігри">G</button>
          <button class="league-sort-btn" type="button" data-sort="battles" title="Бої">B</button>
          <button class="league-sort-btn" type="button" data-sort="winRate" title="WR">WR</button>
          <button class="league-sort-btn" type="button" data-sort="mvpTotal" title="MVP">MVP</button>
          <button class="league-sort-btn" type="button" data-sort="delta" title="Δ">Δ</button>
        </div>
      </div>
    </div>

    <div class="league-table-shell">
      <table class="league-ranking-table" aria-label="Рейтинг гравців ліги">
        <thead class="league-ranking-table__head">
          <tr>
            <th class="league-ranking-table__cell league-ranking-table__cell--place" scope="col">#</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--player" scope="col">Гравець</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--points" scope="col">Очки</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">Ігри</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">Бої</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">WR</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP1</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP2</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">MVP3</th>
            <th class="league-ranking-table__cell league-ranking-table__cell--num" scope="col">Δ</th>
          </tr>
        </thead>
        <tbody class="league-ranking-table__body" id="leagueTableBody"></tbody>
      </table>
    </div>

    <div class="px-card__actions league-actions">
      <button class="btn btn--secondary" id="leagueExpandBtn" type="button">Показати всіх гравців</button>
    </div>
  </section>

  <section class="px-card league-infographic" id="leagueInfographic"></section>
  <section class="px-card league-last-day" id="leagueLastGameDay"></section>
</section>
